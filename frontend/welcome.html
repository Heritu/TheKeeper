<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Keeper // Bem-vindo</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #2b2b2b; /* Fundo escuro padrão do sistema */
        font-family: "Press Start 2P", cursive;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        color: #000;
      }

      /* O "Card" de Pixel Art padronizado */
      .pixel-card {
        background: #fff;
        border: 4px solid #000;
        box-shadow: 8px 8px 0px 0px rgba(0, 0, 0, 1);
        padding: 40px;
        text-align: center;
        width: 450px;
        max-width: 90%;
      }

      /* Estilo do Mascote */
      .logo-img {
        width: 120px;
        margin-bottom: 20px;
        border: 4px solid #000;
        box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 1);
        background-color: #f0f0f0;
      }

      h1 {
        font-size: 24px;
        margin: 10px 0 20px 0;
        text-transform: uppercase;
      }

      p {
        font-size: 10px;
        line-height: 1.8;
        margin-bottom: 35px;
      }

      /* Botão de Ação Principal */
      .btn-start {
        background-color: #4caf50; /* O mesmo verde de entrada de dinheiro */
        color: white;
        border: 4px solid #000;
        box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 1);
        padding: 15px 25px;
        font-family: "Press Start 2P", cursive;
        font-size: 12px;
        text-decoration: none;
        display: inline-block;
        cursor: pointer;
        transition: all 0.1s;
        text-transform: uppercase;
      }

      /* Efeito de clique físico no botão */
      .btn-start:active {
        box-shadow: 0px 0px 0px 0px rgba(0, 0, 0, 1);
        transform: translate(4px, 4px);
      }

      .footer-text {
        font-size: 8px;
        margin-top: 40px;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div class="pixel-card">
      <img
        src="assets/guaxinim_perfil.png"
        alt="Mascote The Keeper"
        class="logo-img"
        onerror="this.style.display = 'none'"
      />

      <h1>THE KEEPER</h1>

      <p>
        Controle seus gastos e gerencie seu dinheiro de forma simples, direta e
        segura.
      </p>

      <a href="/auth" class="btn-start">COMEÇAR AGORA</a>

      <div class="footer-text">PROJETO APLICADO TADS // MVP 2026</div>
    </div>
  </body>
</html>
